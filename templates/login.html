<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style="width: 350px;">
        
        <h3 class="text-center mb-3">Iniciar Sesión</h3>

        <!--MENSAJE DE ERROR -->
        {% if error %}
        <div class="alert alert-danger alert-dismissible fade show d-flex align-items-center" role="alert">
            
            <!-- Icono -->
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" 
                 fill="currentColor" class="bi bi-exclamation-triangle-fill me-2" viewBox="0 0 16 16">
                <path d="M8.982 1.566a1.13 1.13 0 0 0-1.964 0L.165 13.233c-.457.778.091 1.767.982 1.767h13.706c.89 0 1.438-.99.982-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1-2.002 0 1 1 0 0 1 2.002 0z"/>
            </svg>

            <div>
                {{ error }}
            </div>

            <!-- Botón cerrar -->
            <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        <!-- FORMULARIO -->
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input name="username" class="form-control" placeholder="Ingrese usuario" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button class="btn btn-primary w-100">Login</button>
        </form>

        <div class="text-center mt-3">
            <a href="/register">¿No tienes cuenta? Regístrate</a>
        </div>

    </div>
</div>

<!-- Bootstrap JS (necesario para cerrar la alerta) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
